name: React Tests & Coverage

# El workflow se ejecutará cuando hagas push a 'main' o abras un Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests and Check Coverage
    runs-on: ubuntu-latest

    steps:
      # 1. Clona tu código en el servidor de GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Prepara el entorno de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ajusta esta versión a la que uses en tu proyecto
          cache: 'npm'

      # 3. Instala las dependencias limpiamente
      - name: Install dependencies
        run: npm ci

      # 4. Ejecuta los tests y genera el reporte de coverage
      - name: Run Tests with Coverage
        run: npm run test:coverage
